<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Programming Learning Questionnaire</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="survey-card" aria-live="polite">
        <div class="topline">
          <span id="stepLabel">Questionnaire</span>
          <span id="progressLabel">0/0</span>
        </div>

        <div id="screen" class="screen"></div>

        <footer class="actions">
          <p id="validationMessage" class="validation" role="status"></p>
          <button id="nextButton" class="primary" type="button" disabled>Continue</button>
        </footer>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
